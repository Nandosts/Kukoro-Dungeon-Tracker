<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kukoro Tracker</title>
  <style>
    /* TEMA UNIFICADO: DUNGEON DARK */
    body {
      font-family: sans-serif;
      width: 320px;
      padding: 12px;
      background-color: #121212;
      color: #e0e0e0;
    }
    h3 {
      margin: 0;
      font-size: 1.1em;
      color: #d4af37;
    }
    .player-card {
      border: 1px solid #d4af37;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      background-color: #1e1e1e;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    .player-name {
      font-weight: bold;
      color: #f0e6d2;
      font-size: 1.05em;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 5px;
      font-size: 0.8em;
      margin: 8px 0;
      color: #9e9e9e;
    }
    .stat-label {
      color: #9e9e9e;
    }
    .skills {
      margin-top: 5px;
      font-size: 0.8em;
      font-style: italic;
      color: #4db8ff;
      border-top: 1px solid #333;
      padding-top: 5px;
    }
    .tab-btn {
      flex: 1;
      padding: 8px;
      background: none;
      border: none;
      color: #9e9e9e;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: #d4af37 !important;
      font-weight: bold;
      border-bottom: 2px solid #d4af37;
    }
    .filter-btn {
      flex: 1;
      min-width: 60px;
      padding: 5px;
      font-size: 0.75em;
      cursor: pointer;
      background: #26262c;
      color: #adadb8;
      border: 1px solid #333;
      border-radius: 4px;
    }
    .filter-btn.active {
      background: #d4af37 !important;
      color: #121212 !important;
      font-weight: bold;
      border-color: #d4af37;
    }
    .sub-filter-btn {
      padding: 3px 8px;
      font-size: 0.7em;
      cursor: pointer;
      background: #1a1a1e;
      color: #adadb8;
      border: 1px solid #333;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .sub-filter-btn.active {
      background: #d4af37 !important;
      color: #121212 !important;
      border-color: #d4af37 !important;
      font-weight: bold;
    }
    .warning-blink {
      color: #ff5252;
      font-weight: bold;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0% { opacity: 1; text-shadow: 0 0 5px #ff5252; }
      50% { opacity: 0.5; text-shadow: none; }
      100% { opacity: 1; text-shadow: 0 0 5px #ff5252; }
    }
    .player-card.dead {
      opacity: 0.6;
      border-color: #333;
      background-color: #161616;
    }
    
    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #121212; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }

    /* SWITCH (TOGGLE) */
    .switch {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 18px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #333;
      transition: .4s;
      border-radius: 18px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 12px; width: 12px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: #d4af37; }
    input:checked + .slider:before { transform: translateX(16px); }
  </style>
</head>
<body>
  <!-- Cabeçalho Principal -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
    <div style="display: flex; align-items: center; gap: 8px;">
      <h3 id="channel-title">Kukoro Tracker</h3>
      <button id="btn-ready" style="background: none; border: none; cursor: pointer; font-size: 1.1em; padding: 0; opacity: 0.4; filter: grayscale(1); transition: 0.2s;">✅</button>
    </div>
    <label class="switch" id="power-switch-container">
      <input type="checkbox" id="power-switch" checked>
      <span class="slider round"></span>
    </label>
  </div>
  
  <!-- Overlay de Desativado -->
  <div id="disabled-overlay" style="display: none; text-align: center; padding: 20px; background: #1a1e1e; border-radius: 8px; margin-bottom: 12px; border: 1px solid #ff5252;">
    <div style="font-size: 1.5em; margin-bottom: 10px;">⚠️</div>
    <div style="font-weight: bold; color: #ff5252;">Extensão Desativada</div>
    <div style="font-size: 0.8em; color: #9e9e9e; margin-top: 5px;">Ative para capturar novos dados do chat.</div>
  </div>

  <div id="main-content-area">
    <!-- Abas de Navegação -->
    <div style="display: flex; gap: 5px; margin-bottom: 12px; border-bottom: 1px solid #333;">
      <button class="tab-btn active" data-tab="players" id="tab-habilidades">Habilidades</button>
      <button class="tab-btn" data-tab="nicks" id="tab-jogadores">Jogadores</button>
    </div>

    <!-- Conteúdo: Habilidades -->
    <div id="tab-players">
      <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.8em; background: #1e1e1e; padding: 6px 10px; border-radius: 4px; border: 1px solid #333;">
        <div><span id="text-total">Total</span>: <span id="total-count">0</span>/16</div>
        <div id="filtered-container" style="display: none;"><span id="text-filtrados">Filtrados</span>: <span id="filtered-count">0</span></div>
      </div>

      <div style="display: flex; gap: 5px; margin-bottom: 10px;">
        <input type="text" id="search-input" placeholder="Pesquisar..." style="flex: 1; padding: 6px 10px; border-radius: 4px; border: 1px solid #333; background: #1e1e1e; color: white; box-sizing: border-box; font-size: 0.85em; outline: none;">
        <select id="sort-select" style="padding: 5px; background: #1e1e1e; color: #d4af37; border: 1px solid #333; border-radius: 4px; font-size: 0.8em; outline: none; cursor: pointer; font-weight: bold;">
          <option value="recent" id="opt-recent">Recentes</option>
          <option value="lv_desc" id="opt-lv-desc">Maior Nível</option>
          <option value="lv_asc" id="opt-lv-asc">Menor Nível</option>
          <option value="name_asc" id="opt-name-asc">A-Z</option>
        </select>
        <button id="reset-filters" style="padding: 0 10px; background: #333; color: #adadb8; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: 0.8em;">✕</button>
      </div>
      
      <div style="display: flex; gap: 5px; margin-bottom: 10px;">
        <button class="filter-btn active" data-filter="all" id="filter-all">Todos</button>
        <button class="filter-btn" data-filter="alive" id="filter-alive">Vivos</button>
        <button class="filter-btn" data-filter="dead" id="filter-dead">Mortos</button>
      </div>

      <div style="font-size: 0.7em; color: #757575; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;" id="text-vantagem">Vantagem contra:</div>
      <div id="enemy-filters" style="display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap;"></div>

      <div id="player-list"></div>
      <div id="no-data" style="text-align: center; padding: 20px; font-size: 0.85em;">Nenhum dado capturado ainda.</div>
      
      <hr style="border: 0; border-top: 1px solid #333; margin: 12px 0;">
      <button id="clear-btn" style="width: 100%; padding: 10px; background: #8b0000; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.85em; transition: background 0.2s;" onmouseover="this.style.background='#a00000'" onmouseout="this.style.background='#8b0000'">Limpar Canal</button>
      
      <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px; border-top: 1px solid #333; padding-top: 12px;">
        <span style="font-size: 0.85em; color: #9e9e9e;" id="text-show-overlay">Mostrar Overlay na Twitch</span>
        <label class="switch" id="overlay-switch-container">
          <input type="checkbox" id="overlay-switch">
          <span class="slider round"></span>
        </label>
      </div>

      <!-- Rodapé de Apoio -->
      <div style="margin-top: 15px; padding-top: 10px; text-align: center; border-top: 1px dashed #333;">
        <div style="display: flex; justify-content: center; align-items: center; gap: 8px; opacity: 0.7; transition: opacity 0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">
          <span style="font-size: 0.65em; color: #adadb8;" id="text-support-dev">Apoie o desenvolvimento:</span>
          <button id="btn-copy-pix" style="display: flex; align-items: center; gap: 3px; background: transparent; color: #32bcad; border: 1px solid #32bcad; border-radius: 4px; padding: 2px 6px; cursor: pointer; font-size: 0.65em; font-weight: bold;">
            <svg viewBox="0 0 512 512" width="10" height="10" fill="currentColor"><path d="M125.8 190.5L39 277.4c-9 9-9 23.5 0 32.5l86.8 86.8c9 9 23.5 9 32.5 0l21-21-65.3-65.3c-9-9-9-23.5 0-32.5l65.3-65.3-21-21c-9-9-23.5-9-32.5 0zM386.2 321.5l86.8-86.8c9-9 9-23.5 0-32.5l-86.8-86.8c-9-9-23.5-9-32.5 0l-21 21 65.3 65.3c9 9 9 23.5 0 32.5L332.7 300l21 21c9 9 23.5 9 32.5.5zM224 224l32-32 32 32-32 32-32-32z"></path></svg>
            <span id="text-pix-btn">Pix</span>
          </button>
          <a id="btn-tip-link" href="https://streamelements.com/nando_sts/tip" target="_blank" style="display: flex; align-items: center; gap: 3px; background: transparent; color: #d4af37; border: 1px solid #d4af37; border-radius: 4px; padding: 2px 6px; cursor: pointer; font-size: 0.65em; text-decoration: none; font-weight: bold;">
            ☕ <span id="text-tip-btn">Tip</span>
          </a>
        </div>
      </div>
    </div>

    <!-- Conteúdo: Jogadores (Lista de Nicks) -->
    <div id="tab-nicks" style="display: none;">
      <div id="nick-list" style="background: #1e1e1e; padding: 12px; border-radius: 8px; font-family: monospace; white-space: pre-wrap; font-size: 0.9em; line-height: 1.5; border: 1px solid #333; color: #f0e6d2; min-height: 100px; max-height: 300px; overflow-y: auto;"></div>
      <button id="copy-nicks" style="width: 100%; margin-top: 12px; padding: 10px; background: #d4af37; color: #121212; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.9em; transition: background 0.2s;" onmouseover="this.style.background='#c49f27'" onmouseout="this.style.background='#d4af37'">Copiar Todos</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
