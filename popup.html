<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kukoro Tracker</title>
  <style>
    body {
      font-family: sans-serif;
      width: 300px;
      padding: 10px;
      background-color: #18181b;
      color: white;
    }
    .player-card {
      border: 1px solid #9147ff;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      background-color: #1f1f23;
    }
    .player-name {
      font-weight: bold;
      color: #bf94ff;
      font-size: 1.1em;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      font-size: 0.9em;
      margin-top: 5px;
    }
    .stat-label {
      color: #adadb8;
    }
    .skills {
      margin-top: 5px;
      font-size: 0.85em;
      font-style: italic;
      color: #00ffcc;
    }
    .filter-btn.active {
      background: #9147ff !important;
      font-weight: bold;
    }
    .warning-blink {
      color: #ff4b4b;
      font-weight: bold;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0% { opacity: 1; text-shadow: 0 0 5px #ff0000; }
      50% { opacity: 0.5; text-shadow: none; }
      100% { opacity: 1; text-shadow: 0 0 5px #ff0000; }
    }
    .player-card.dead {
      opacity: 0.6;
      border-color: #444;
      background-color: #1a1a1e;
    }
    .sub-filter-btn.active {
      background: #bf94ff !important;
      color: black !important;
      border-color: #bf94ff !important;
    }
  </style>
</head>
<body>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
    <h3 id="channel-title" style="margin: 0;">Dungeon Players</h3>
    <label class="switch" title="Ligar/Desligar Extensão">
      <input type="checkbox" id="power-switch" checked>
      <span class="slider round"></span>
    </label>
  </div>
  
  <div id="disabled-overlay" style="display: none; text-align: center; padding: 20px; background: #3a1a1a; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ff4b4b;">
    <div style="font-size: 1.5em; margin-bottom: 10px;">⚠️</div>
    <div style="font-weight: bold; color: #ff4b4b;">Extensão Desativada</div>
    <div style="font-size: 0.8em; color: #adadb8; margin-top: 5px;">Ative para capturar novos dados do chat.</div>
  </div>

  <div style="display: flex; gap: 5px; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 5px;">
    <button class="tab-btn active" data-tab="players" style="flex: 1; padding: 8px; background: none; border: none; color: white; cursor: pointer; font-weight: bold;">Habilidades</button>
    <button class="tab-btn" data-tab="nicks" style="flex: 1; padding: 8px; background: none; border: none; color: #adadb8; cursor: pointer;">Jogadores</button>
  </div>

  <div id="tab-players">
    <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.85em; background: #26262c; padding: 8px; border-radius: 4px;">
      <div>Total: <span id="total-count">0</span>/16</div>
      <div id="filtered-container" style="display: none;">Filtrados: <span id="filtered-count">0</span></div>
    </div>

    <div style="display: flex; gap: 5px; margin-bottom: 10px;">
      <input type="text" id="search-input" placeholder="Pesquisar nome ou habilidade..." style="flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #333; background: #26262c; color: white; box-sizing: border-box; min-width: 0;">
      <select id="sort-select" style="padding: 5px; background: #26262c; color: white; border: 1px solid #333; border-radius: 4px; font-size: 0.8em; outline: none; cursor: pointer;">
        <option value="recent">Recentes</option>
        <option value="lv_desc">Maior Nível</option>
        <option value="lv_asc">Menor Nível</option>
        <option value="name_asc">A-Z</option>
      </select>
      <button id="reset-filters" title="Limpar todos os filtros" style="padding: 0 10px; background: #333; color: #adadb8; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: 0.8em;">✕</button>
    </div>
    
    <div style="display: flex; gap: 5px; margin-bottom: 5px; flex-wrap: wrap;">
      <button class="filter-btn active" data-filter="all" style="flex: 1; min-width: 60px; padding: 5px; font-size: 0.75em; cursor: pointer; background: #333; color: white; border: none; border-radius: 4px;">Todos</button>
      <button class="filter-btn" data-filter="alive" style="flex: 1; min-width: 60px; padding: 5px; font-size: 0.75em; cursor: pointer; background: #333; color: white; border: none; border-radius: 4px;">Vivos</button>
      <button class="filter-btn" data-filter="dead" style="flex: 1; min-width: 60px; padding: 5px; font-size: 0.75em; cursor: pointer; background: #333; color: white; border: none; border-radius: 4px;">Mortos</button>
    </div>

    <div style="font-size: 0.75em; color: #adadb8; margin-bottom: 5px;">Vantagem contra inimigos detectados:</div>
    <div id="enemy-filters" style="display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap;">
      <!-- Filtros dinâmicos inseridos via JS -->
    </div>

    <div id="player-list"></div>
    <div id="no-data">Nenhum dado capturado ainda.</div>
    <hr style="border: 0; border-top: 1px solid #333; margin: 10px 0;">
    <button id="clear-btn" style="width: 100%; padding: 8px; background: #eb0400; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Limpar Canal</button>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px;">
      <span style="font-size: 0.85em; color: #adadb8;">Mostrar Overlay na Twitch</span>
      <label class="switch" title="Mostrar/Ocultar Janela Flutuante">
        <input type="checkbox" id="overlay-switch">
        <span class="slider round"></span>
      </label>
    </div>
  </div>

  <div id="tab-nicks" style="display: none;">
    <div id="nick-list" style="background: #1f1f23; padding: 10px; border-radius: 8px; font-family: monospace; white-space: pre-wrap; font-size: 0.9em; line-height: 1.5;"></div>
    <button id="copy-nicks" style="width: 100%; margin-top: 10px; padding: 8px; background: #9147ff; color: white; border: none; border-radius: 4px; cursor: pointer;">Copiar Todos</button>
  </div>
  
  <style>
    /* Estilos para o Switch (Toggle) */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #333;
      transition: .4s;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
    }
    input:checked + .slider {
      background-color: #9147ff;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    .slider.round {
      border-radius: 20px;
    }
    .slider.round:before {
      border-radius: 50%;
    }
  </style>
  <script src="popup.js"></script>
</body>
</html>
